server.port=8080
spring.application.name=load-balancing-gateway

# Route named "load_balanced_route": requests to /loadbalanced/** are load-balanced
# across instances registered under the logical name "example-service" (note the lb:// scheme)
spring.cloud.gateway.routes[0].id=load_balanced_route
spring.cloud.gateway.routes[0].uri=lb://example-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/loadbalanced/**

# --- Simple static service discovery (no Eureka/Consul needed for this exercise) ---
# Registers 2 hard-coded instances of "example-service" so the load balancer has
# something real to distribute requests across. Run example-service twice
# (see example-service/README.md) on ports 8081 and 8082 to see it in action.
spring.cloud.discovery.client.simple.instances.example-service[0].uri=http://localhost:8081
spring.cloud.discovery.client.simple.instances.example-service[1].uri=http://localhost:8082

logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.cloud.loadbalancer=DEBUG
