server.port=8080
spring.application.name=resilience-gateway

# Demo route: forwards /resilient/** to a downstream service, guarded by a circuit breaker.
# httpbin.org/delay/{n} is used here purely as a public test endpoint that lets you
# simulate a slow/unresponsive downstream service by increasing {n} past the timeout.
spring.cloud.gateway.routes[0].id=example_resilient_route
spring.cloud.gateway.routes[0].uri=https://httpbin.org
spring.cloud.gateway.routes[0].predicates[0]=Path=/resilient/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/resilient/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.name=exampleCircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.fallbackUri=forward:/fallback

# Circuit breaker tuning (referenced by name "exampleCircuitBreaker")
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3

management.endpoints.web.exposure.include=health,circuitbreakers
management.health.circuitbreakers.enabled=true

logging.level.org.springframework.cloud.gateway=INFO
logging.level.io.github.resilience4j=DEBUG
